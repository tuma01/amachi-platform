# Configuración general del sistema
app:
  bootstrap:
    tenant:
      # ======================================================
      # TENANT GLOBAL
      # - Tenant reservado para operaciones de SUPER_ADMIN
      # - No tiene address
      # ======================================================
      tenantGlobal:
        code: GLOBAL
        name: "Global System Tenant"
        type: GLOBAL
        description: "Tenant reservado para administración global del sistema"

      # ======================================================
      # TENANT LOCAL BASE
      # - Tenant inicial de negocio (Hospital A)
      # - Address se define solo en perfiles (-dev, -test)
      # ======================================================
      tenantLocal:
        code: hospital-san-borja
        name: "Hospital San Borja"
        type: HOSPITAL
        legalName: "Hospital Materno Infantil San Borja S.R.L."
        taxId: "NIT-123456789-0"
        medicalLicense: "MS-MIN-1992-001"
        fallbackHeader: X-Tenant-Code
        allowLocal: true
        defaultDomain: localhost
        # ------------------------------------------------------
        # Dirección inicial obligatoria
        # - Puede ser editada luego desde frontend
        # ------------------------------------------------------
        address:
          streetNumber: "100"
          streetName: "Calle Cochabamba"
          city: "San Borja"
          municipalityId: 6   # San Borja
          provinceId: 3   # Jose Ballivian
          stateId: 8  # Benu
          countryId: 26   # Bolivia
          phone: "+591 2 1234567"

    # ======================================================
    # SUPER ADMIN GLOBAL
    # - Pertenece al tenant GLOBAL
    # - Acceso total a la plataforma
    # ======================================================
    superAdmin:
      email: "superadmin@test.com"
      password: "password"
      firstName: "System"
      lastName: "Administrator"
      personType: SUPER_ADMIN

    # ======================================================
    # TENANT ADMIN LOCAL
    # - Administrador del tenant hospital-san-borja
    # ======================================================
    tenantAdmin:
      email: "admin@test.com"
      password: "password"
      firstName: "Tenant"
      lastName: "Administrator"
      personType: ADMIN

